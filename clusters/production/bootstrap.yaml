purser:
  customer_billing:
    - tenant:
        ref: quartermaster.system_tenant
      model: postpaid
      tier: free
      entitlement_overrides:
        max_concurrent_streams: 0
        max_concurrent_viewers: 0
      cluster_access: derived

accounts:
  - kind: system_operator
    tenant:
      ref: quartermaster.system_tenant
    users:
      - email: info@frameworks.network
        role: owner
        first_name: FrameWorks
        last_name: Operator
        platform_operator: true
        password_ref:
          sops: ../../secrets/production.env
          key: PLATFORM_ADMIN_PASSWORD

commodore:
  # frameworks-demo is a Mist-native always-on loop. The source clip lives
  # on the elected EU media edge (placed by the demo_assets Ansible role);
  # ts-exec inside MistServer reads it locally and loops indefinitely.
  mist_native_streams:
    - playback_id: frameworks-demo
      owner_tenant:
        ref: quartermaster.system_tenant
      title: FrameWorks marketing demo
      description: Mist-native always-on loop driving the marketing landing-page player.
      source: "ts-exec:ffmpeg -re -stream_loop -1 -i /var/lib/frameworks/demo/frameworks-demo-source.mp4 -map 0:v:0 -an -c:v copy -f mpegts -"
      source_kind: exec
      always_on: true
      is_recording_enabled: false
      # Keep the always-on marketing demo running without Skipper AI health monitoring.
      monitoring: "off"
      # Mist process config array — same shape MistServer's STREAM_PROCESS
      # trigger consumes. Thumbnail sprites only; no transcode.
      process_policy:
        - process: Thumbs
          track_select: "video=maxbps"
          track_inhibit: "subtitle=all"
          inconsequential: true
          exit_unmask: true
          x-LSP-name: Thumbnail Sprites
      placement_count: 1
      allowed_cluster_ids: [media-eu-1]
      local_assets:
        - path: /var/lib/frameworks/demo/frameworks-demo-source.mp4
          sha256: d223026c5de919045a4a1c307810d5161dbfe25b4e975c15cf027204ada78b28
          note: CC0 source clip; provisioned via gitops/clusters/production/demo_assets.yml + frameworks.infra.demo_assets role
