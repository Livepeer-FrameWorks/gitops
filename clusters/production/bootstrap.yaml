purser:
  customer_billing:
    - tenant:
        ref: quartermaster.system_tenant
      model: postpaid
      tier: free
      cluster_access: derived

accounts:
  - kind: system_operator
    tenant:
      ref: quartermaster.system_tenant
    users:
      - email: info@frameworks.network
        role: owner
        first_name: FrameWorks
        last_name: Operator
        password_ref:
          sops: ../../secrets/production.env
          key: PLATFORM_ADMIN_PASSWORD

commodore:
  pull_streams:
    - playback_id: frameworks-demo
      owner_tenant:
        ref: quartermaster.system_tenant
      title: FrameWorks marketing demo
      description: Operator-owned pull stream for the marketing landing-page player.
      source_uri_ref:
        sops: ../../secrets/production.env
        key: MARKETING_DEMO_PULL_SOURCE_URI
      enabled: true
