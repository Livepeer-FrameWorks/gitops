version: v1
type: cluster
profile: production
channel: stable
root_domain: frameworks.network
env_files:
  - ../../config/production.env
  - ../../secrets/production.env
hosts_file: hosts.enc.yaml
bootstrap_overlay: bootstrap.yaml

hosts:
  central-eu-1:
    cluster: core-central-primary
    roles: [infrastructure, services, interfaces]
    labels:
      region: eu-west
    wireguard_ip: 10.88.156.88
    wireguard_public_key: vFYvnHNr+gmD7kYO8BE+fUTtLb1mhzNpao2AkVFcugA=
    wireguard_port: 51820
  yuga-eu-1:
    cluster: core-central-primary
    roles: [infrastructure]
    labels:
      region: eu-west
    wireguard_ip: 10.88.112.204
    wireguard_public_key: QUNWNWj8AyFfNAXkHudxNiOhwU7lA2z2DEoto0dVQnI=
    wireguard_port: 51820
  yuga-eu-2:
    cluster: core-central-primary
    roles: [infrastructure]
    labels:
      region: eu-west
    wireguard_ip: 10.88.147.42
    wireguard_public_key: +XXxcytn1rynRMHwok3R7As9JlI+vm3PQIlfjyCa/2Q=
    wireguard_port: 51820
  yuga-eu-3:
    cluster: core-central-primary
    roles: [infrastructure]
    labels:
      region: eu-west
    wireguard_ip: 10.88.89.127
    wireguard_public_key: tW+e/IB1LOjiauoDJ2s5xCx1ZJWIRiQq6dyEXuEKpwQ=
    wireguard_port: 51820
  regional-eu-1:
    cluster: core-central-primary
    roles: [services, interfaces]
    labels:
      region: eu-west
    wireguard_ip: 10.88.158.227
    wireguard_public_key: E1cM5TPD6Bv+WwSf/3MWFuD33YBHix4v2Gv5xZ4RJ1s=
    wireguard_port: 51820
  regional-us-1:
    cluster: core-central-primary
    roles: [services, interfaces]
    labels:
      region: us-east
    wireguard_ip: 10.88.236.29
    wireguard_public_key: g8jOYxdVoTDaEoPBpuveaJEw7Nd+uvnbDs8Y3c/l/QI=
    wireguard_port: 51820

clusters:
  core-central-primary:
    name: Core Central Primary
    type: central
    owner_tenant: frameworks
    roles: [control, data, analytics, support, infra, mesh, interface, observability]
  media-central-primary:
    name: Media Central Primary
    type: edge
    default: true
    platform_official: true
    owner_tenant: frameworks
    roles: [media]
    pricing:
      model: tier_inherit
      required_tier_level: 0
      allow_free_tier: true

geoip:
  enabled: true
  source: maxmind
  remote_path: /usr/share/GeoIP/GeoLite2-City.mmdb
  services: [foghorn, quartermaster]

infrastructure:
  postgres:
    enabled: true
    engine: yugabyte
    mode: native
    version: "2025.1.3.2"
    port: 5433
    nodes:
      - host: yuga-eu-1
        id: 1
      - host: yuga-eu-2
        id: 2
      - host: yuga-eu-3
        id: 3
    instances:
      - name: support
        host: central-eu-1
        port: 5432
        version: "16"
        databases:
          - name: chatwoot
            owner: chatwoot
          - name: listmonk
            owner: listmonk
    databases:
      - name: quartermaster
      - name: commodore
      - name: foghorn
      - name: purser
      - name: navigator
      - name: skipper
      - name: periscope
  clickhouse:
    enabled: true
    mode: native
    version: "25.9.2.1"
    host: yuga-eu-1
    port: 9000
    databases: [periscope]
  kafka:
    enabled: true
    mode: native
    version: "4.2.0"
    cluster_id: "0MZ8hASuQlWtafZoUhBuGw"
    min_insync_replicas: 2
    controllers:
      - host: central-eu-1
        id: 100
        port: 9093
        dir_id: "lFZPzuroSk6ARAoIIJrhrA"
      - host: regional-eu-1
        id: 101
        port: 9093
        dir_id: "3hBihAu6Q3azGAMvkat57Q"
      - host: regional-us-1
        id: 102
        port: 9093
        dir_id: "ZoZCnB6FTT26KAux5HP9og"
    brokers:
      - host: central-eu-1
        id: 1
        port: 9092
      - host: regional-eu-1
        id: 2
        port: 9092
      - host: regional-us-1
        id: 3
        port: 9092
    topics:
      - name: analytics_events
        partitions: 6
        replication_factor: 3
      - name: service_events
        partitions: 3
        replication_factor: 3
      - name: billing.usage_reports
        partitions: 3
        replication_factor: 3
      - name: decklog_events_dlq
        partitions: 3
        replication_factor: 3
  zookeeper:
    enabled: false
  redis:
    enabled: true
    mode: native
    instances:
      - name: foghorn
        host: central-eu-1
        port: 6379
        password: ${REDIS_FOGHORN_PASSWORD}
      - name: chatwoot
        host: central-eu-1
        port: 6380
        password: ${REDIS_CHATWOOT_PASSWORD}

services:
  # Central — control plane + support
  quartermaster:
    enabled: true
    mode: native
    host: central-eu-1
  privateer:
    enabled: true
    mode: native
    # No host — deploys to all non-edge hosts
  commodore:
    enabled: true
    mode: native
    host: central-eu-1
  purser:
    enabled: true
    mode: native
    host: central-eu-1
  periscope-query:
    enabled: true
    mode: native
    host: central-eu-1
  navigator:
    enabled: true
    mode: native
    host: central-eu-1
  skipper:
    enabled: true
    mode: native
    host: central-eu-1
  steward:
    enabled: true
    mode: native
    host: central-eu-1
  deckhand:
    enabled: true
    mode: native
    host: central-eu-1

  chandler:
    enabled: true
    mode: native
    host: central-eu-1
    clusters: [media-central-primary]

  # Self-hosted support dependencies (Docker)
  listmonk:
    enabled: true
    mode: docker
    image: listmonk/listmonk:v4.0.1
    host: central-eu-1
  chatwoot:
    enabled: true
    mode: docker
    image: chatwoot/chatwoot:v3.14.0
    host: central-eu-1

  # Observability (Docker)
  metabase:
    enabled: true
    mode: docker
    image: metabase/metabase:v0.59.1
    host: central-eu-1

  # Regional — data plane (EU + US)
  bridge:
    enabled: true
    mode: native
    hosts: [regional-eu-1, regional-us-1]
  foghorn:
    enabled: true
    mode: native
    host: central-eu-1
    clusters: [media-central-primary]
  livepeer-gateway:
    enabled: true
    mode: native
    host: central-eu-1
    clusters: [media-central-primary]
    config:
      http_addr: ":8935"
      auth_webhook_url: "http://foghorn.internal:18008/webhooks/livepeer/auth"
  signalman:
    enabled: true
    mode: native
    hosts: [regional-eu-1, regional-us-1]
  decklog:
    enabled: true
    mode: native
    hosts: [regional-eu-1, regional-us-1]
  periscope-ingest:
    enabled: true
    mode: native
    hosts: [regional-eu-1, regional-us-1]

interfaces:
  nginx:
    enabled: true
    mode: native
    hosts: [central-eu-1, regional-eu-1, regional-us-1]
  chartroom:
    enabled: true
    mode: docker
    hosts: [regional-eu-1, regional-us-1]
  foredeck:
    enabled: true
    mode: docker
    hosts: [regional-eu-1, regional-us-1]
  logbook:
    enabled: true
    mode: docker
    hosts: [regional-eu-1, regional-us-1]

observability:
  victoriametrics:
    enabled: true
    mode: docker
    image: victoriametrics/victoria-metrics:v1.136.3
    host: central-eu-1
    port: 8428
    config:
      VM_RETENTION_PERIOD: 90d
      VM_HTTP_AUTH_USERNAME: telemetry

  vmagent:
    enabled: true
    mode: docker
    image: victoriametrics/vmagent:v1.136.3
    hosts: [central-eu-1, regional-eu-1, regional-us-1]

  vmauth:
    enabled: true
    mode: docker
    image: victoriametrics/vmauth:v1.136.3
    hosts: [regional-eu-1, regional-us-1]
    port: 8427

  grafana:
    enabled: true
    mode: docker
    image: grafana/grafana:12.4.2
    host: central-eu-1
    port: 3000

wireguard:
  enabled: true
  mesh_cidr: 10.88.0.0/16
  listen_port: 51820
