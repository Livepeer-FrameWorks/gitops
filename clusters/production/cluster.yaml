clusters:
  core-central-primary:
    name: Core Central Primary
    type: central
    owner_tenant: frameworks
    roles: [control, data, analytics, support, infra, mesh, interface, observability]
  media-eu-1:
    name: Media EU 1
    type: edge
    region: eu-west
    default: true
    platform_official: true
    allow_private_pull_sources: false
    owner_tenant: frameworks
    roles: [media]
    env_files:
      - ../../config/cluster-media-eu-1.env
      - ../../secrets/cluster-media-eu-1.env
    s3_bucket: frameworks
    s3_endpoint: https://nbg1.your-objectstorage.com
    s3_region: nbg1
    pricing:
      model: tier_inherit
      required_tier_level: 0
      allow_free_tier: true
  media-us-1:
    name: Media US East 1
    type: edge
    region: us-east
    default: false
    platform_official: true
    allow_private_pull_sources: false
    owner_tenant: frameworks
    roles: [media]
    env_files:
      - ../../config/cluster-media-us-1.env
      - ../../secrets/cluster-media-us-1.env
    s3_bucket: frameworks-enam
    s3_endpoint: https://71602460cfd3e5468bd355ff1f4bb607.r2.cloudflarestorage.com
    s3_region: auto
    pricing:
      model: tier_inherit
      required_tier_level: 0
      allow_free_tier: true

geoip:
  enabled: true
  source: maxmind
  remote_path: /usr/share/GeoIP/GeoLite2-City.mmdb
  services: [foghorn-eu, foghorn-us, quartermaster, livepeer-gateway-eu, livepeer-gateway-us]

infrastructure:
  postgres:
    enabled: true
    engine: yugabyte
    mode: native
    version: "2025.1.3.2"
    port: 5433
    nodes:
      - host: yuga-eu-1
        id: 1
      - host: yuga-eu-2
        id: 2
      - host: yuga-eu-3
        id: 3
    instances:
      - name: support
        host: central-eu-1
        port: 5432
        version: "16"
        databases:
          - name: chatwoot
            owner: chatwoot
          - name: listmonk
            owner: listmonk
    databases:
      - name: quartermaster
      - name: commodore
      - name: foghorn
      - name: purser
      - name: navigator
      - name: skipper
      - name: periscope
  clickhouse:
    enabled: true
    mode: native
    version: "25.9.2.1"
    host: yuga-eu-1
    port: 9000
    databases: [periscope]
  kafka:
    enabled: true
    mode: native
    version: "4.2.0"
    cluster_id: "0MZ8hASuQlWtafZoUhBuGw"
    region_id: eu-west
    role: aggregator
    min_insync_replicas: 2
    controllers:
      - host: regional-eu-1
        id: 101
        port: 9093
        dir_id: "3hBihAu6Q3azGAMvkat57Q"
      - host: regional-eu-2
        id: 102
        port: 9093
        dir_id: "U0qmfoalRf6Fc0MI6vcCjA"
      - host: regional-eu-3
        id: 103
        port: 9093
        dir_id: "QaH5mP6MTJOCy9xGp5CxDQ"
    brokers:
      - host: regional-eu-1
        id: 2
        port: 9092
      - host: regional-eu-2
        id: 3
        port: 9092
      - host: regional-eu-3
        id: 4
        port: 9092
    topics:
      - name: analytics_events
        partitions: 6
        replication_factor: 3
      - name: service_events
        partitions: 3
        replication_factor: 3
      - name: billing.usage_reports
        partitions: 3
        replication_factor: 3
      - name: decklog_events_dlq
        partitions: 3
        replication_factor: 3
    regional:
      - region_id: us-east
        role: regional
        cluster_id: "H6ecrIcnQx2sb2lfpS9ZJg"
        min_insync_replicas: 2
        controllers:
          - host: regional-us-1
            id: 201
            port: 9093
            dir_id: "FYanxaRqQFeJpU6GzvSXUQ"
          - host: regional-us-2
            id: 202
            port: 9093
            dir_id: "QX2OGdeARw-JlNhWeoQWeQ"
          - host: regional-us-3
            id: 203
            port: 9093
            dir_id: "YGQqBRKvRKuTVnGwUDCW7Q"
        brokers:
          - host: regional-us-1
            id: 11
            port: 9092
          - host: regional-us-2
            id: 12
            port: 9092
          - host: regional-us-3
            id: 13
            port: 9092
        topics:
          - name: analytics_events
            partitions: 6
            replication_factor: 3
          - name: service_events
            partitions: 3
            replication_factor: 3
          - name: billing.usage_reports
            partitions: 3
            replication_factor: 3
          - name: decklog_events_dlq
            partitions: 3
            replication_factor: 3
        mirror_topics:
          - analytics_events
          - service_events
          - billing.usage_reports
          - decklog_events_dlq
    mirrormaker:
      enabled: true
      hosts: [regional-eu-1, regional-eu-2, regional-eu-3]
      heap_opts: "-Xmx1G -Xms1G"
      task_count: 2
  zookeeper:
    enabled: false
  redis:
    enabled: true
    mode: native
    instances:
      - name: foghorn
        cluster: media-eu-1
        mode: sentinel
        host: regional-eu-1
        replica_hosts: [regional-eu-2, regional-eu-3]
        sentinels:
          - { host: regional-eu-1, port: 26379 }
          - { host: regional-eu-2, port: 26379 }
          - { host: regional-eu-3, port: 26379 }
        master_name: foghorn
        port: 6379
        password: ${REDIS_FOGHORN_PASSWORD}
      - name: foghorn
        cluster: media-us-1
        mode: sentinel
        host: regional-us-1
        replica_hosts: [regional-us-2, regional-us-3]
        sentinels:
          - { host: regional-us-1, port: 26379 }
          - { host: regional-us-2, port: 26379 }
          - { host: regional-us-3, port: 26379 }
        master_name: foghorn
        port: 6379
        password: ${REDIS_FOGHORN_PASSWORD}
      - name: chatwoot
        host: central-eu-1
        port: 6380
        password: ${REDIS_CHATWOOT_PASSWORD}

services:
  # Central — control plane + support
  quartermaster:
    enabled: true
    mode: native
    host: central-eu-1
  privateer:
    enabled: true
    mode: native
    # No host — deploys to all non-edge hosts
  commodore:
    enabled: true
    mode: native
    host: central-eu-1
  purser:
    enabled: true
    mode: native
    host: central-eu-1
  periscope-query:
    enabled: true
    mode: native
    host: central-eu-1
  navigator:
    enabled: true
    mode: native
    host: central-eu-1
  skipper:
    enabled: true
    mode: native
    host: central-eu-1
  steward:
    enabled: true
    mode: native
    host: central-eu-1
  deckhand:
    enabled: true
    mode: native
    host: central-eu-1

  chandler-eu:
    enabled: true
    mode: native
    deploy: chandler
    hosts: [regional-eu-1, regional-eu-2, regional-eu-3]
    cluster: media-eu-1
  chandler-us:
    enabled: true
    mode: native
    deploy: chandler
    hosts: [regional-us-1, regional-us-2, regional-us-3]
    cluster: media-us-1

  # Self-hosted support dependencies (Docker)
  listmonk:
    enabled: true
    mode: docker
    image: listmonk/listmonk:v4.0.1
    host: central-eu-1
  chatwoot:
    enabled: true
    mode: docker
    image: chatwoot/chatwoot:v3.14.0
    host: central-eu-1

  # Observability (Docker)
  metabase:
    enabled: true
    mode: docker
    image: metabase/metabase:v0.59.1
    host: central-eu-1

  # Regional — data plane (EU + US)
  bridge:
    enabled: true
    mode: native
    hosts: [regional-eu-1, regional-eu-2, regional-eu-3, regional-us-1, regional-us-2, regional-us-3]
  foghorn-eu:
    enabled: true
    mode: native
    deploy: foghorn
    hosts: [regional-eu-1, regional-eu-2, regional-eu-3]
    cluster: media-eu-1
  foghorn-us:
    enabled: true
    mode: native
    deploy: foghorn
    hosts: [regional-us-1, regional-us-2, regional-us-3]
    cluster: media-us-1
  livepeer-gateway-eu:
    enabled: true
    mode: native
    deploy: livepeer-gateway
    hosts: [regional-eu-1, regional-eu-2, regional-eu-3]
    cluster: media-eu-1
    config:
      http_addr: "0.0.0.0:8935"
  livepeer-gateway-us:
    enabled: true
    mode: native
    deploy: livepeer-gateway
    hosts: [regional-us-1, regional-us-2, regional-us-3]
    cluster: media-us-1
    config:
      http_addr: "0.0.0.0:8935"
  signalman:
    enabled: true
    mode: native
    hosts: [regional-eu-1, regional-eu-2, regional-eu-3, regional-us-1, regional-us-2, regional-us-3]
  decklog:
    enabled: true
    mode: native
    hosts: [regional-eu-1, regional-eu-2, regional-eu-3, regional-us-1, regional-us-2, regional-us-3]
  periscope-ingest:
    enabled: true
    mode: native
    hosts: [regional-eu-1, regional-eu-2, regional-eu-3, regional-us-1, regional-us-2, regional-us-3]

interfaces:
  nginx:
    enabled: true
    mode: native
    hosts: [central-eu-1, regional-eu-1, regional-eu-2, regional-eu-3, regional-us-1, regional-us-2, regional-us-3]
  chartroom:
    enabled: true
    mode: docker
    hosts: [regional-eu-1, regional-eu-2, regional-eu-3, regional-us-1, regional-us-2, regional-us-3]
  foredeck:
    enabled: true
    mode: docker
    hosts: [regional-eu-1, regional-eu-2, regional-eu-3, regional-us-1, regional-us-2, regional-us-3]
  logbook:
    enabled: true
    mode: docker
    hosts: [regional-eu-1, regional-eu-2, regional-eu-3, regional-us-1, regional-us-2, regional-us-3]

observability:
  victoriametrics:
    enabled: true
    mode: docker
    image: victoriametrics/victoria-metrics:v1.136.3
    host: central-eu-1
    port: 8428
    config:
      VM_RETENTION_PERIOD: 90d
      VM_HTTP_AUTH_USERNAME: telemetry

  vmagent:
    enabled: true
    mode: docker
    image: victoriametrics/vmagent:v1.136.3
    hosts: [central-eu-1, regional-eu-1, regional-eu-2, regional-eu-3, regional-us-1, regional-us-2, regional-us-3]

  vmauth:
    enabled: true
    mode: docker
    image: victoriametrics/vmauth:v1.136.3
    hosts: [regional-eu-1, regional-eu-2, regional-eu-3, regional-us-1, regional-us-2, regional-us-3]
    port: 8427

  grafana:
    enabled: true
    mode: docker
    image: grafana/grafana:12.4.2
    host: central-eu-1
    port: 3000

wireguard:
  enabled: true
  mesh_cidr: 10.88.0.0/16
  listen_port: 51820
